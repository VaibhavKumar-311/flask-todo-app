{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">

        <div class="card card-elevated border-0 shadow-lg overflow-hidden">

            <div class="card-header-gradient px-4 py-4">
                <h1 class="h4 mb-0 text-white">Welcome back</h1>
                <p class="mb-0 text-white-50 small">
                    Sign in to manage your tasks
                </p>
            </div>

            <div class="card-body p-4">

                <form method="post" action="{{ url_for('auth.login') }}">

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control form-control-lg"
                            id="username"
                            name="username"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            Password
                        </label>

                        <div class="input-group">

                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="password"
                                name="password"
                                required
                            >

                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                onclick="togglePassword()"
                            >
                                Show
                            </button>

                        </div>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg w-100 rounded-pill"
                    >
                        Login
                    </button>

                </form>

                <p class="text-center text-secondary mt-4 mb-0 small">
                    No account?
                    <a href="{{ url_for('auth.register') }}">
                        Create one
                    </a>
                </p>

            </div>
        </div>

    </div>
</div>

<script>
function togglePassword() {

    const passwordInput = document.getElementById("password");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>

{% endblock %}
