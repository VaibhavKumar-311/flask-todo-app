<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tasks{% endblock %} · Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-body">
    <nav class="navbar navbar-expand-lg navbar-glass sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="{{ url_for('tasks.index') if current_user.is_authenticated else url_for('auth.login') }}">
                <span class="brand-icon rounded-3 d-inline-flex align-items-center justify-content-center">✓</span>
                Todo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                    {% if current_user.is_authenticated %}
                    <li class="nav-item">
                        <span class="nav-link text-secondary small">Hi, {{ current_user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tasks.index') }}">My tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.login') }}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.register') }}">Register</a>
                    </li>
                    {% endif %}
                    <li class="nav-item ms-lg-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-3 theme-toggle"
                                id="themeToggle" aria-label="Toggle dark mode">
                            <span class="theme-icon-light">☀️</span>
                            <span class="theme-icon-dark d-none">🌙</span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container app-main pt-4 pt-lg-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script>
        (function () {
            var root = document.documentElement;
            var stored = localStorage.getItem("theme");
            function applyTheme(theme) {
                root.setAttribute("data-bs-theme", theme);
                localStorage.setItem("theme", theme);
                document.querySelectorAll(".theme-icon-light").forEach(function (el) {
                    el.classList.toggle("d-none", theme === "dark");
                });
                document.querySelectorAll(".theme-icon-dark").forEach(function (el) {
                    el.classList.toggle("d-none", theme !== "dark");
                });
            }
            if (stored === "dark" || stored === "light") {
                applyTheme(stored);
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
                applyTheme("dark");
            }
            var btn = document.getElementById("themeToggle");
            if (btn) {
                btn.addEventListener("click", function () {
                    var next = root.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
                    applyTheme(next);
                });
            }
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
